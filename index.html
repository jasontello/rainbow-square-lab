<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Rainbow Square Lab</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="landing-page">
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="brand-mark" href="#" aria-label="Rainbow Square Lab home">
          <span></span>
          Rainbow Square Lab
        </a>
        <div class="nav-links" aria-label="Project sections">
          <a href="#motion">Motion</a>
        </div>
      </nav>

      <section class="hero" aria-label="Interactive rainbow color field">
        <div class="visual-stage" id="motion" aria-label="Animated rainbow square orb">
          <div class="orb-shadow" aria-hidden="true"></div>
          <div class="orb-shell" id="orb-shell" role="button" tabindex="0" aria-label="Morph the rainbow field into a smooth color wheel">
            <div class="orb-grid" id="rainbow-orb"></div>
            <div class="smooth-wheel" aria-hidden="true"></div>
          </div>
          <div class="orb-caption">
            <span>rainbow field</span>
            <span id="mode-caption">click to morph</span>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
